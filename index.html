<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya's Quiz Portal</title>
<style>
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0ede8;
    --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.15);
    --text: #1a1a1a; --text2: #5a5a5a; --text3: #8a8a8a;
    --accent: #c43a0b; --accent-bg: #fff0eb; --accent-border: rgba(196,58,11,0.2);
    --shadow: 0 1px 3px rgba(0,0,0,0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110; --surface: #1c1b19; --surface2: #242320;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text: #f0ede8; --text2: #a8a49e; --text3: #6a6660;
      --accent: #ff8c5a; --accent-bg: #2a1a12; --accent-border: rgba(255,140,90,0.2);
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

  .header { background: var(--surface); border-bottom: 0.5px solid var(--border2); padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .header-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; height: 56px; gap: 16px; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .logo-text { font-size: 15px; font-weight: 500; color: var(--text); white-space: nowrap; }
  .search-wrap { flex: 1; max-width: 320px; position: relative; }
  .search { width: 100%; padding: 7px 12px 7px 34px; border: 0.5px solid var(--border2); border-radius: 8px; background: var(--surface2); color: var(--text); font-size: 13px; outline: none; transition: border-color 0.15s; }
  .search:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
  .header-count { font-size: 12px; color: var(--text3); white-space: nowrap; margin-left: auto; }

  .main { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }
  .hero { margin-bottom: 36px; }
  .hero h1 { font-size: 24px; font-weight: 500; margin-bottom: 5px; }
  .hero p { font-size: 14px; color: var(--text2); }
  .hero-accent { color: var(--accent); font-weight: 500; }

  /* Subject (top level) */
  .subject-section { margin-bottom: 40px; }
  .subject-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 0.5px solid var(--border2); }
  .subject-icon { width: 34px; height: 34px; background: var(--accent-bg); border: 0.5px solid var(--accent-border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .subject-title { font-size: 17px; font-weight: 500; }
  .subject-count { margin-left: auto; font-size: 12px; color: var(--text3); background: var(--surface2); padding: 2px 10px; border-radius: 20px; }

  /* Folders — depth-based indentation */
  .folder { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; margin-bottom: 6px; overflow: hidden; box-shadow: var(--shadow); }
  .folder-header { display: flex; align-items: center; gap: 9px; padding: 11px 16px; cursor: pointer; user-select: none; transition: background 0.12s; }
  .folder-header:hover { background: var(--accent-bg); }
  .folder-chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
  .folder.open > .folder-header .folder-chevron { transform: rotate(90deg); }
  .folder-name { font-size: 13.5px; font-weight: 500; color: var(--text); flex: 1; }
  .folder-badge { font-size: 11px; color: var(--text3); background: var(--surface2); padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
  .folder-body { display: none; padding: 4px 0 4px 0; border-top: 0.5px solid var(--border); }
  .folder.open > .folder-body { display: block; }
  .folder-children { padding: 4px 8px 4px 16px; }

  /* Quiz items */
  .quiz-item { display: flex; align-items: center; padding: 8px 16px 8px 32px; text-decoration: none; gap: 9px; transition: background 0.1s; }
  .quiz-item:hover { background: var(--surface2); }
  .quiz-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0.4; flex-shrink: 0; transition: opacity 0.1s; }
  .quiz-item:hover .quiz-dot { opacity: 1; }
  .quiz-name { font-size: 13px; color: var(--text); flex: 1; line-height: 1.4; }
  .quiz-arrow { font-size: 12px; color: var(--text3); opacity: 0; transition: opacity 0.1s, transform 0.1s; }
  .quiz-item:hover .quiz-arrow { opacity: 1; transform: translateX(2px); }
  .folder-empty { padding: 10px 16px 10px 32px; font-size: 12px; color: var(--text3); font-style: italic; }

  .state-msg { text-align: center; padding: 48px 24px; color: var(--text3); font-size: 14px; }
  .state-msg .icon { font-size: 28px; margin-bottom: 10px; }
  .quiz-item.hidden { display: none; }

  @media (max-width: 600px) {
    .main { padding: 20px 16px 60px; }
    .header { padding: 0 16px; }
    .logo-text { display: none; }
    .search-wrap { max-width: none; }
  }
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-icon">&#127994;</div>
      <span class="logo-text">Aditya's Quiz Portal</span>
    </a>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input class="search" type="text" placeholder="Search quizzes..." id="searchInput" autocomplete="off">
    </div>
    <span class="header-count" id="headerCount"></span>
  </div>
</header>

<main class="main">
  <div class="hero">
    <h1>Quiz Library</h1>
    <p>Browse by subject. Click any quiz to start. <span class="hero-accent">Progress syncs across all your devices.</span></p>
  </div>
  <div id="content">
    <div class="state-msg"><div class="icon">&#9203;</div>Loading quizzes...</div>
  </div>
</main>

<script>
const GITHUB_USER = "adityajain1407";
const GITHUB_REPO = "quizzes";
const GITHUB_BRANCH = "main";
const BASE_URL = "https://" + GITHUB_USER + ".github.io/" + GITHUB_REPO;
const API_URL = "https://api.github.com/repos/" + GITHUB_USER + "/" + GITHUB_REPO + "/git/trees/" + GITHUB_BRANCH + "?recursive=1";

const SUBJECT_ICONS = {
  history: "\uD83D\uDCDC", geography: "\uD83C\uDF0D", polity: "\u2696\uFE0F",
  economy: "\uD83D\uDCC8", science: "\uD83D\uDD2C", environment: "\uD83C\uDF3F",
  art: "\uD83C\uDFA8", culture: "\uD83C\uDFDB\uFE0F", default: "\uD83D\uDCC1"
};

function getIcon(name) {
  const key = name.toLowerCase();
  for (const [k, v] of Object.entries(SUBJECT_ICONS)) {
    if (key.includes(k)) return v;
  }
  return SUBJECT_ICONS.default;
}

function cleanName(filename) {
  return filename.replace(/\.html$/i, "").replace(/^\d+[.\-\s]+/, "").trim();
}

function toggleFolder(el) {
  el.closest(".folder").classList.toggle("open");
}

async function loadFiles() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error();
    const data = await res.json();
    return (data.tree || []).filter(f =>
      f.type === "blob" &&
      (f.path.endsWith(".html") || f.path.endsWith(".md")) &&
      f.path !== "index.html" &&
      !f.path.endsWith("README.md")
    );
  } catch(e) { return null; }
}

// Build a recursive tree from file paths
// Each node: { __files__: [], __folders__: { name: node } }
function buildTree(files) {
  const root = { __files__: [], __folders__: {} };
  for (const f of files) {
    const isQuiz = f.path.endsWith(".html");
    const parts = f.path.split("/");
    let node = root;
    // Navigate/create folders for all parts except the filename
    for (let i = 0; i < parts.length - 1; i++) {
      const part = parts[i];
      if (!node.__folders__[part]) {
        node.__folders__[part] = { __files__: [], __folders__: {} };
      }
      node = node.__folders__[part];
    }
    // Add the file to the final node (only if it is a quiz html)
    if (isQuiz) {
      node.__files__.push(f);
    }
    // placeholder.md: already created the folder nodes above, nothing else to do
  }
  return root;
}

function countQuizzes(node) {
  let count = node.__files__.length;
  for (const child of Object.values(node.__folders__)) {
    count += countQuizzes(child);
  }
  return count;
}

function quizItemHTML(f) {
  const name = cleanName(f.path.split("/").pop());
  const url = BASE_URL + "/" + f.path.split("/").map(p => encodeURIComponent(p)).join("/");
  return "<a class=\"quiz-item\" href=\"" + url + "\" target=\"_blank\" data-name=\"" + name.toLowerCase() + "\">" +
    "<span class=\"quiz-dot\"></span>" +
    "<span class=\"quiz-name\">" + name + "</span>" +
    "<span class=\"quiz-arrow\">\u2192</span>" +
    "</a>";
}

// Recursively build folder HTML for any depth
function buildFolderHTML(name, node) {
  const total = countQuizzes(node);
  const fid = "f-" + Math.random().toString(36).slice(2);
  const subfolderKeys = Object.keys(node.__folders__).sort();

  let bodyHTML = "";
  // Direct quiz files first
  if (node.__files__.length) {
    bodyHTML += node.__files__.map(quizItemHTML).join("");
  }
  // Subfolders recursively
  if (subfolderKeys.length) {
    bodyHTML += "<div class=\"folder-children\">" +
      subfolderKeys.map(k => buildFolderHTML(k, node.__folders__[k])).join("") +
      "</div>";
  }
  if (!bodyHTML) {
    bodyHTML = "<div class=\"folder-empty\">No quizzes yet.</div>";
  }

  return "<div class=\"folder\" id=\"" + fid + "\">" +
    "<div class=\"folder-header\" onclick=\"toggleFolder(this)\">" +
    "<span class=\"folder-chevron\">\u25BA</span>" +
    "<span class=\"folder-name\">\uD83D\uDCC1 " + name + "</span>" +
    "<span class=\"folder-badge\">" + total + " quiz" + (total !== 1 ? "zes" : "") + "</span>" +
    "</div>" +
    "<div class=\"folder-body\">" + bodyHTML + "</div>" +
    "</div>";
}

// Build top-level subject section
function buildSubjectHTML(name, node) {
  const icon = getIcon(name);
  const total = countQuizzes(node);
  const subfolderKeys = Object.keys(node.__folders__).sort();

  let html = "<section class=\"subject-section\">" +
    "<div class=\"subject-header\">" +
    "<div class=\"subject-icon\">" + icon + "</div>" +
    "<span class=\"subject-title\">" + name + "</span>" +
    "<span class=\"subject-count\">" + total + " total</span>" +
    "</div>";

  // Direct files under subject root
  if (node.__files__.length) html += node.__files__.map(quizItemHTML).join("");
  // Subfolders
  if (subfolderKeys.length) html += subfolderKeys.map(k => buildFolderHTML(k, node.__folders__[k])).join("");

  html += "</section>";
  return html;
}

function initSearch(totalCount) {
  document.getElementById("headerCount").textContent = totalCount + " quiz" + (totalCount !== 1 ? "zes" : "");
  const input = document.getElementById("searchInput");
  input.addEventListener("input", () => {
    const q = input.value.toLowerCase().trim();
    let visible = 0;
    document.querySelectorAll(".quiz-item").forEach(item => {
      const match = !q || item.dataset.name.includes(q);
      item.classList.toggle("hidden", !match);
      if (match) visible++;
    });
    if (q) {
      document.querySelectorAll(".folder").forEach(folder => {
        const hasMatch = folder.querySelectorAll(".quiz-item:not(.hidden)").length > 0;
        if (hasMatch) folder.classList.add("open");
      });
    }
    document.getElementById("headerCount").textContent =
      q ? visible + " match" + (visible !== 1 ? "es" : "") : totalCount + " quiz" + (totalCount !== 1 ? "zes" : "");
  });
}

async function init() {
  const content = document.getElementById("content");
  const files = await loadFiles();
  const safeFiles = files || [];

  const tree = buildTree(safeFiles);
  const topLevelKeys = Object.keys(tree.__folders__).sort();
  const rootFiles = tree.__files__;
  const totalCount = safeFiles.filter(f => f.path.endsWith(".html")).length;

  let html = "";

  if (topLevelKeys.length === 0 && rootFiles.length === 0) {
    html = "<div class=\"state-msg\"><div class=\"icon\">\uD83D\uDCED</div>No quizzes yet.<br>Upload quiz HTML files into folders in your GitHub repository.</div>";
  } else {
    html += topLevelKeys.map(k => buildSubjectHTML(k, tree.__folders__[k])).join("");
    if (rootFiles.length) {
      html += "<section class=\"subject-section\">" +
        "<div class=\"subject-header\">" +
        "<div class=\"subject-icon\">\uD83D\uDCC1</div>" +
        "<span class=\"subject-title\">Uncategorised</span>" +
        "<span class=\"subject-count\">" + rootFiles.length + " total</span>" +
        "</div>" +
        rootFiles.map(quizItemHTML).join("") +
        "</section>";
    }
  }

  if (!files) {
    html += "<div class=\"state-msg\" style=\"margin-top:16px;\"><div class=\"icon\">\u26A0\uFE0F</div>Could not reach GitHub API. Open this page via<br><strong>https://" + GITHUB_USER + ".github.io/" + GITHUB_REPO + "/</strong></div>";
  }

  content.innerHTML = html;
  initSearch(totalCount);
}

init();
</script>
</body>
</html>
