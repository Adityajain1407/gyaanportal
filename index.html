<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyaan Portal - Learning Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <style>
        :root {
            --bg: #f4f6fa;
            --surface: #ffffff;
            --surface-2: #f8f9fa;
            --surface-3: #eef2f6;
            --border: rgba(0,0,0,0.06);
            --border-2: rgba(0,0,0,0.1);
            --text: #1e293b;
            --text-2: #475569;
            --text-3: #64748b;
            --accent: #f97316;
            --accent-dark: #ea580c;
            --accent-bg: #fff7ed;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 8px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 15px 25px -8px rgba(0,0,0,0.1);
            --radius-card: 20px;
            --transition: all 0.25s ease;
            --button-text: #ffffff;
        }

        html[data-theme="ocean"] {
            --bg: #e0f2fe;
            --surface: #ffffff;
            --text: #082f49;
            --accent: #0284c7;
        }
        html[data-theme="forest"] {
            --bg: #f0fdf4;
            --surface: #ffffff;
            --text: #14532d;
            --accent: #16a34a;
        }
        html[data-theme="sunset"] {
            --bg: #fff1f2;
            --surface: #ffffff;
            --text: #881337;
            --accent: #e11d48;
        }
        html[data-theme="cherry"] {
            --bg: #fce7f3;
            --surface: #ffffff;
            --text: #740550;
            --accent: #ec4899;
        }
        html[data-theme="indigo"] {
            --bg: #eef2ff;
            --surface: #ffffff;
            --text: #312e81;
            --accent: #4f46e5;
        }

        html.dark { --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --accent: #fb923c; }
        html.dark[data-theme="ocean"] { --bg: #082f49; --surface: #0c4a6e; --text: #e0f2fe; --accent: #38bdf8; }
        html.dark[data-theme="forest"] { --bg: #052e16; --surface: #14532d; --text: #f0fdf4; --accent: #4ade80; }
        html.dark[data-theme="sunset"] { --bg: #4c0519; --surface: #881337; --text: #fff1f2; --accent: #fb7185; }
        html.dark[data-theme="cherry"] { --bg: #500724; --surface: #740550; --text: #fce7f3; --accent: #f472b6; }
        html.dark[data-theme="indigo"] { --bg: #1e1b4b; --surface: #312e81; --text: #eef2ff; --accent: #818cf8; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 18px;
            color: var(--text-2);
            margin-bottom: 8px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-top: 40px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent);
        }

        .upload-box {
            background: var(--surface);
            border: 2px dashed var(--border-2);
            border-radius: var(--radius-card);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 20px;
        }

        .upload-box:hover {
            border-color: var(--accent);
            background: var(--surface-2);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .upload-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .upload-subtext {
            font-size: 14px;
            color: var(--text-3);
        }

        input[type="file"] { display: none; }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .file-card {
            background: var(--surface);
            border-radius: var(--radius-card);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid var(--border);
        }

        .file-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .file-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .file-name {
            font-weight: 600;
            color: var(--text);
            font-size: 15px;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .file-type {
            font-size: 12px;
            color: var(--text-3);
            margin-bottom: 4px;
        }

        .file-date {
            font-size: 12px;
            color: var(--text-3);
            margin-bottom: 12px;
        }

        .file-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--button-text);
        }

        .btn-primary:hover { background: var(--accent-dark); }

        .btn-secondary {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border-2);
        }

        .btn-secondary:hover { background: var(--surface-3); }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover { background: #dc2626; }

        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .auth-card {
            background: var(--surface);
            border-radius: var(--radius-card);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-2);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-2);
            border-radius: 8px;
            background: var(--surface-2);
            color: var(--text);
            font-size: 14px;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-bg);
        }

        .pin-dots {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .pin-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 2px solid var(--border-2);
            transition: var(--transition);
        }

        .pin-dot.filled {
            background: var(--accent);
            border-color: var(--accent);
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .pin-pad button {
            aspect-ratio: 1;
            font-size: 20px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
        }

        .auth-error {
            min-height: 18px;
            font-size: 13px;
            color: #ef4444;
            text-align: center;
            margin-bottom: 12px;
        }

        .auth-forgot {
            background: transparent;
            border: none;
            color: var(--text-3);
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            width: 100%;
            margin-top: 8px;
        }

        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border-2);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .settings-btn:hover {
            background: var(--surface-2);
        }

        .settings-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--surface);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-lg);
            padding: 16px;
            min-width: 200px;
            z-index: 1001;
            display: none;
        }

        .settings-panel.open { display: block; }

        .settings-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .settings-item:last-child { border-bottom: none; }

        .settings-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .theme-btn {
            padding: 8px;
            border: 2px solid var(--border-2);
            background: var(--surface-2);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: var(--transition);
        }

        .theme-btn:hover { border-color: var(--accent); }

        .theme-btn.active {
            border-color: var(--accent);
            background: var(--accent-bg);
            color: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-2);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-text {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            z-index: 10000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            .logo { font-size: 36px; }
            .files-grid { grid-template-columns: 1fr; }
            .auth-card { padding: 24px; }
        }
    </style>
</head>
<body data-theme="default">
    <div class="container">
        <div class="header">
            <div class="logo">📚 Gyaan Portal</div>
            <div class="tagline">Manage Your Learning Resources</div>
        </div>

        <div class="section-title">📖 Note Files</div>
        <div class="upload-box" onclick="document.getElementById('noteUpload').click()">
            <div class="upload-icon">📤</div>
            <div class="upload-text">Upload Note Files</div>
            <div class="upload-subtext">Drag & drop or click to select (HTML files)</div>
            <input type="file" id="noteUpload" accept=".html" multiple>
        </div>
        <div class="files-grid" id="noteGrid"></div>

        <div class="section-title">🧠 Quiz Files</div>
        <div class="upload-box" onclick="document.getElementById('quizUpload').click()">
            <div class="upload-icon">📤</div>
            <div class="upload-text">Upload Quiz Files</div>
            <div class="upload-subtext">Drag & drop or click to select (HTML files)</div>
            <input type="file" id="quizUpload" accept=".html" multiple>
        </div>
        <div class="files-grid" id="quizGrid"></div>
    </div>

    <button class="settings-btn" id="settingsBtn">⚙️</button>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-item">
            <div class="settings-label">Theme</div>
            <div class="theme-grid">
                <button class="theme-btn active" data-theme="default">Default</button>
                <button class="theme-btn" data-theme="ocean">Ocean</button>
                <button class="theme-btn" data-theme="forest">Forest</button>
                <button class="theme-btn" data-theme="sunset">Sunset</button>
                <button class="theme-btn" data-theme="cherry">Cherry</button>
                <button class="theme-btn" data-theme="indigo">Indigo</button>
            </div>
        </div>
        <div class="settings-item">
            <label>
                <input type="checkbox" id="darkToggle">
                <span style="margin-left: 8px; font-size: 13px; font-weight: 600;">Dark Mode</span>
            </label>
        </div>
        <div class="settings-item">
            <button class="btn btn-secondary" style="width: 100%;" onclick="logoutUser()">Logout</button>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBxxxxxxxxxxxx",
            authDomain: "gyaan-portal-xxxxx.firebaseapp.com",
            databaseURL: "https://gyaan-portal-xxxxx.firebasedatabase.app",
            projectId: "gyaan-portal-xxxxx",
            storageBucket: "gyaan-portal-xxxxx.appspot.com",
            messagingSenderId: "xxxxxxxxxxxxx",
            appId: "xxxxxxxxxxxxx"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        const USERS_FB_KEY = 'gyaan_users';
        let currentUser = null;
        let inactivityTimeout = null;
        const INACTIVITY_TIME = 15 * 60 * 1000; // 15 minutes

        async function sha256(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function setSavedUser(u) { localStorage.setItem('gyaan_user', u || ''); }
        function getSavedUser() { return localStorage.getItem('gyaan_user'); }
        function setSessionToken(t) { sessionStorage.setItem('gyaan_token', t || ''); }
        function getSessionToken() { return sessionStorage.getItem('gyaan_token'); }

        function startInactivityWatch() {
            stopInactivityWatch();
            inactivityTimeout = setTimeout(() => {
                lockSession();
            }, INACTIVITY_TIME);
        }

        function stopInactivityWatch() {
            if (inactivityTimeout) clearTimeout(inactivityTimeout);
        }

        document.addEventListener('click', () => { if (currentUser) startInactivityWatch(); });
        document.addEventListener('keydown', () => { if (currentUser) startInactivityWatch(); });

        function showAuthOverlay(html, onClose) {
            const overlay = document.createElement('div');
            overlay.id = 'authOverlay';
            overlay.className = 'auth-overlay';
            overlay.innerHTML = html;
            document.body.appendChild(overlay);
            onClose?.(overlay);
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) removeAuthOverlay();
            });
        }

        function removeAuthOverlay() {
            const overlay = document.getElementById('authOverlay');
            if (overlay) {
                // ===== FIX #3: REMOVE EVENT LISTENER & CLEANUP =====
                if (overlay._pinKeyHandler) {
                    document.removeEventListener('keydown', overlay._pinKeyHandler);
                    delete overlay._pinKeyHandler;
                }
                overlay.remove();
            }
        }

        function authCard(title, subtitle, content) {
            return `
                <div class="auth-card">
                    <div class="auth-title">${title}</div>
                    <div class="auth-subtitle">${subtitle}</div>
                    ${content}
                </div>
            `;
        }

        // ===== FIX #1: SHOW PIN SCREEN WITH CORRECT isLock PARAMETER =====
        function showPinScreen(u, isLock = false, onSuccess) {
            stopInactivityWatch();
            const sub = isLock ? 'Session locked due to inactivity' : 'Enter your 4-digit PIN';
            const html = authCard(`Welcome back, ${u}`, sub,
                `<div style="text-align:center;">
                    <div class="pin-dots" id="pinDots">
                        ${[0,1,2,3].map(i => `<div class="pin-dot" data-i="${i}"></div>`).join('')}
                    </div>
                    <div class="pin-pad" id="pinPad"></div>
                    <div class="auth-error" id="pinErr" style="min-height:18px;"></div>
                    <button id="pinForgot" class="auth-forgot">Use password instead</button>
                </div>`);
            showAuthOverlay(html, el => {
                let digits = '', attempts = 0;
                const errEl = el.querySelector('#pinErr');
                buildPinPad(el, async (d) => {
                    if (d === 'del') {
                        digits = digits.slice(0, -1);
                    } else if (digits.length < 4) {
                        digits += d;
                    }
                    updatePinDots(el, digits);
                    errEl.textContent = '';
                    if (digits.length === 4) {
                        const pinHash = await sha256(digits + u);
                        const snap = await db.ref(`${USERS_FB_KEY}/${u}/pin`).get();
                        if (snap.val() === pinHash) {
                            finishLogin(u, onSuccess);
                        } else {
                            attempts++;
                            errEl.textContent = `Incorrect PIN${attempts >= 3 ? ' — use password instead' : ''}`;
                            digits = '';
                            updatePinDots(el, digits);
                        }
                    }
                }, isLock); // ← Pass isLock correctly as requirePadActivation
                el.querySelector('#pinForgot').onclick = () => {
                    setSavedUser(null); setSessionToken(null); currentUser = null;
                    showLoginScreen(onSuccess);
                };
            });
        }

        // ===== FIX #2: BUILD PIN PAD WITH ROBUST ACTIVATION & KEY FILTERING =====
        function buildPinPad(el, onDigit, requirePadActivation = false) {
            const pad = el.querySelector('#pinPad');
            if (!pad) return;
            pad.innerHTML = '';
            const btnStyle = 'border:1.5px solid var(--border-2);background:var(--surface-2);border-radius:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.1s;pointer-events:auto;';

            let pinCheckInFlight = false;
            let padActivated = !requirePadActivation; // false if activation required

            const safeOnDigit = (d) => {
                if (!pinCheckInFlight) {
                    pinCheckInFlight = true;
                    Promise.resolve(onDigit(d)).finally(() => { pinCheckInFlight = false; });
                }
            };

            // Build numeric pad
            [1,2,3,4,5,6,7,8,9,'',0,'del'].forEach(k => {
                const b = document.createElement('button');
                b.style.cssText = btnStyle;
                b.innerHTML = k === 'del' ? '⌫' : k === '' ? '' : k;
                if (k === '') { b.style.visibility = 'hidden'; pad.appendChild(b); return; }
                b.addEventListener('click', () => {
                    // Activate pad on any click
                    padActivated = true;
                    b.style.transform = 'scale(0.9)';
                    setTimeout(() => b.style.transform = '', 100);
                    safeOnDigit(String(k));
                });
                b.addEventListener('touchstart', () => b.style.background = 'var(--surface-3)', { passive: true });
                b.addEventListener('touchend', () => {
                    b.style.background = 'var(--surface-2)';
                    padActivated = true; // also activate on touch
                }, { passive: true });
                pad.appendChild(b);
            });

            // Remove any existing keydown listener for this overlay
            if (el._pinKeyHandler) {
                document.removeEventListener('keydown', el._pinKeyHandler);
            }

            el._pinKeyHandler = (e) => {
                // Ignore if overlay is gone
                if (!document.getElementById('authOverlay')) return;
                // Block keyboard until pad is activated (important for lock screen)
                if (!padActivated) return;
                // Ignore if focus is inside an input
                const tag = document.activeElement?.tagName;
                if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
                // Only allow digits and Backspace
                if (e.key >= '0' && e.key <= '9') {
                    e.preventDefault();
                    safeOnDigit(e.key);
                } else if (e.key === 'Backspace') {
                    e.preventDefault();
                    safeOnDigit('del');
                }
                // Any other key is ignored
            };

            document.addEventListener('keydown', el._pinKeyHandler);
        }

        function updatePinDots(el, digits) {
            el.querySelectorAll('.pin-dot').forEach((dot, i) => {
                dot.classList.toggle('filled', i < digits.length);
            });
        }

        function showLoginScreen(onSuccess) {
            const html = authCard('Sign In', 'Enter credentials',
                `<div style="margin-bottom:16px;">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="loginUser" class="form-input" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="loginPass" class="form-input" autocomplete="current-password">
                    </div>
                    <div class="auth-error" id="loginErr" style="min-height:18px;"></div>
                    <button class="btn btn-primary" style="width:100%;" onclick="doLogin()">Sign In</button>
                </div>`);
            showAuthOverlay(html, el => {
                window.doLogin = async () => {
                    const u = el.querySelector('#loginUser').value.trim();
                    const p = el.querySelector('#loginPass').value;
                    const err = el.querySelector('#loginErr');
                    err.textContent = '';
                    if (!u || !p) { err.textContent = 'All fields required'; return; }
                    const snap = await db.ref(`${USERS_FB_KEY}/${u}`).get();
                    if (!snap.exists()) { err.textContent = 'User not found'; return; }
                    const pHash = await sha256(p);
                    if (snap.val().password === pHash) {
                        setSavedUser(u);
                        const token = Math.random().toString(36).substring(7);
                        setSessionToken(token);
                        finishLogin(u, onSuccess);
                    } else {
                        err.textContent = 'Incorrect password';
                    }
                };
                el.querySelector('#loginUser').focus();
            });
        }

        function finishLogin(u, onSuccess) {
            currentUser = u;
            removeAuthOverlay();
            startInactivityWatch();
            loadFiles();
            onSuccess?.();
            showToast(`Logged in as ${u}`);
        }

        function lockSession() {
            const u = currentUser;
            if (!u) return;
            currentUser = null;
            showPinScreen(u, true, () => loadFiles());
        }

        function logoutUser() {
            setSavedUser(null);
            setSessionToken(null);
            currentUser = null;
            document.getElementById('settingsPanel').classList.remove('open');
            showLoginScreen();
        }

        function loadFiles() {
            const noteGrid = document.getElementById('noteGrid');
            const quizGrid = document.getElementById('quizGrid');
            const notes = JSON.parse(localStorage.getItem('gyaan_notes') || '[]');
            const quizzes = JSON.parse(localStorage.getItem('gyaan_quizzes') || '[]');
            
            noteGrid.innerHTML = notes.length ? notes.map(f => fileCard(f, 'note')).join('') : '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No notes uploaded yet</div></div>';
            quizGrid.innerHTML = quizzes.length ? quizzes.map(f => fileCard(f, 'quiz')).join('') : '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No quizzes uploaded yet</div></div>';
        }

        function fileCard(f, type) {
            const icon = type === 'note' ? '📖' : '🧠';
            return `
                <div class="file-card">
                    <div class="file-icon">${icon}</div>
                    <div class="file-name">${f.name}</div>
                    <div class="file-type">${type.toUpperCase()}</div>
                    <div class="file-date">${new Date(f.date).toLocaleDateString()}</div>
                    <div class="file-actions">
                        <button class="btn btn-primary" onclick="openFile('${type}', ${f.id})">Open</button>
                        <button class="btn btn-danger" onclick="deleteFile('${type}', ${f.id})">Delete</button>
                    </div>
                </div>
            `;
        }

        function openFile(type, id) {
            const key = type === 'note' ? 'gyaan_notes' : 'gyaan_quizzes';
            const files = JSON.parse(localStorage.getItem(key) || '[]');
            const file = files.find(f => f.id === id);
            if (file) window.open(file.url, '_blank');
        }

        function deleteFile(type, id) {
            if (!confirm('Delete this file?')) return;
            const key = type === 'note' ? 'gyaan_notes' : 'gyaan_quizzes';
            let files = JSON.parse(localStorage.getItem(key) || '[]');
            files = files.filter(f => f.id !== id);
            localStorage.setItem(key, JSON.stringify(files));
            loadFiles();
            showToast('File deleted');
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        document.getElementById('settingsBtn').onclick = () => {
            document.getElementById('settingsPanel').classList.toggle('open');
        };

        document.getElementById('darkToggle').onchange = (e) => {
            document.documentElement.classList.toggle('dark', e.target.checked);
            localStorage.setItem('gyaan_dark', e.target.checked);
        };

        document.querySelectorAll('[data-theme]').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('[data-theme]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.documentElement.setAttribute('data-theme', btn.dataset.theme);
                localStorage.setItem('gyaan_theme', btn.dataset.theme);
            };
        });

        document.getElementById('noteUpload').onchange = (e) => handleUpload(e, 'note');
        document.getElementById('quizUpload').onchange = (e) => handleUpload(e, 'quiz');

        function handleUpload(e, type) {
            if (!currentUser) { showToast('Please login first'); return; }
            const files = Array.from(e.target.files);
            const key = type === 'note' ? 'gyaan_notes' : 'gyaan_quizzes';
            let saved = JSON.parse(localStorage.getItem(key) || '[]');
            files.forEach(f => {
                const url = URL.createObjectURL(f);
                saved.push({ id: Date.now() + Math.random(), name: f.name, date: new Date().toISOString(), url });
            });
            localStorage.setItem(key, JSON.stringify(saved));
            loadFiles();
            showToast(`${files.length} file(s) uploaded`);
            e.target.value = '';
        }

        // Initialize
        window.onload = () => {
            document.documentElement.setAttribute('data-theme', localStorage.getItem('gyaan_theme') || 'default');
            document.documentElement.classList.toggle('dark', localStorage.getItem('gyaan_dark') === 'true');
            const u = getSavedUser();
            const t = getSessionToken();
            if (u && t) {
                currentUser = u;
                startInactivityWatch();
                loadFiles();
                showToast(`Welcome back, ${u}`);
            } else {
                showLoginScreen();
            }
        };
    </script>
</body>
</html>
