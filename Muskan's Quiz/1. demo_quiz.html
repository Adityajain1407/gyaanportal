    function toggleNavPane() { document.getElementById('navPane').classList.toggle('show'); }
    function moveToQuestion(newPos) {
        if (!quizActive) return;
        if (mode === 'revision') {
            if (newPos >= 0 && newPos < order.length) revisionMove(newPos - currentPos);
            return;
        }
        if (skipReviewMode) {
            if (skipReviewList.includes(order[newPos])) {
                const direction = newPos >= currentPos ? 1 : -1;
                currentPos = newPos;
                currentSkipReviewIndex = skipReviewList.indexOf(order[newPos]);
                renderCurrent(true, direction); autoSave();
            }
            return;
        }
        if (newPos >= 0 && newPos < order.length) {
            const direction = newPos >= currentPos ? 1 : -1;
            currentPos = newPos;
            renderCurrent(true, direction);
            autoSave();
        }
    }

    // --- Answer / Skip / Finish ---
    function handleAnswer(selectedLetter) {
        markInteraction();
        autoResumeTimerIfPaused();
        if (!quizActive) return;
        const origIdx = order[currentPos];
        const isCorrect = selectedLetter === FULL_QUIZ[origIdx].ans;
        if (skipReviewMode) {
            if (answersState[origIdx] !== 'skipped') return;
            userSelections[origIdx] = selectedLetter;
            answersState[origIdx] = isCorrect ? 'correct' : 'incorrect';
            updateTopStats(); renderCurrent(false, 1, true); autoSave();
            return;
        }
        if (answersState[origIdx] === 'unanswered' || answersState[origIdx] === 'skipped') {
            userSelections[origIdx] = selectedLetter;
            answersState[origIdx] = isCorrect ? 'correct' : 'incorrect';
            updateTopStats(); renderCurrent(false, 1, true); autoSave();
        }
    }
    function nextAfterAnswer() {
        if (!quizActive) return;
        if (skipReviewMode) {
            let idx = skipReviewList.indexOf(order[currentPos]);
            if (idx !== -1) skipReviewList.splice(idx, 1);
            if (skipReviewList.length > 0) {
                let nextPos = order.indexOf(skipReviewList[0]);
                if (nextPos !== -1) moveToQuestion(nextPos);
            } else endSkipReviewSession();
            autoSave(); return;
        }
        const currentOrig = order[currentPos];
        if (answersState[currentOrig] === 'correct' || answersState[currentOrig] === 'incorrect') {
            let nxt = getNextUnansweredPos(currentPos + 1);
            if (nxt !== -1) moveToQuestion(nxt); else promptFinishOrReview();
            autoSave();
        }
    }
    function skipCurrent() {
        markInteraction();
        autoResumeTimerIfPaused();
        if (!quizActive) return;
        const currentOrig = order[currentPos];
        if (!skipReviewMode && (answersState[currentOrig] === 'correct' || answersState[currentOrig] === 'incorrect')) return;
        if (skipReviewMode) {
            if (currentSkipReviewIndex + 1 < skipReviewList.length) {
                let nextPos = order.indexOf(skipReviewList[currentSkipReviewIndex + 1]);
                if (nextPos !== -1) moveToQuestion(nextPos);
            } else endSkipReviewSession();
            autoSave(); return;
        }
        if (answersState[currentOrig] === 'unanswered') {
            answersState[currentOrig] = 'skipped';
            updateTopStats();
            let nxt = getNextUnansweredPos(currentPos + 1);
            if (nxt !== -1) moveToQuestion(nxt); else promptFinishOrReview();
        } else if (answersState[currentOrig] === 'skipped') {
            let nxt = getNextUnansweredPos(currentPos + 1);
            if (nxt !== -1) moveToQuestion(nxt); else promptFinishOrReview();
        }
        autoSave();
    }
    function promptFinishOrReview() {
        if (!quizActive) return;
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-content"><button class="popup-close-btn" id="closeFinishModalBtn" aria-label="Close">✕</button><h3>Finish Quiz?</h3><p>What would you like to do?</p><div class="vertical-btn-group"><button class="confirm-yes" id="yesFinish">✓ Yes, Finish</button><button class="confirm-neutral" id="noFinish">↩ Review Skipped</button><button class="confirm-no" id="exitQuizBtn">✕ Exit</button></div></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('closeFinishModalBtn').onclick = () => modalDiv.remove();
        document.getElementById('yesFinish').onclick = () => { modalDiv.remove(); finishQuiz(); };
        document.getElementById('noFinish').onclick = () => {
            modalDiv.remove();
            const skippedIndices = [];
            for (let i = 0; i < answersState.length; i++) if (answersState[i] === 'skipped') skippedIndices.push(i);
            if (skippedIndices.length === 0) finishQuiz(); else enterSkipReviewMode(skippedIndices);
        };
        document.getElementById('exitQuizBtn').onclick = () => { modalDiv.remove(); promptSaveProgress(); };
    }
    function enterSkipReviewMode(skippedIndices) {
        skipReviewMode = true; skipReviewList = [...skippedIndices]; currentSkipReviewIndex = 0;
        let firstPos = order.indexOf(skipReviewList[0]);
        if (firstPos !== -1) moveToQuestion(firstPos); else renderCurrent();
        autoSave();
    }
    function endSkipReviewSession() { skipReviewMode = false; skipReviewList = []; promptFinishOrReview(); }

    // --- Exit quiz: save-progress confirmation, reached via the Exit
    // option in the Finish modal above (no separate standalone close
    // button anymore — it was colliding with the icon row on narrow
    // screens, and folding it in here means one less floating element
    // competing for space). ---
    function promptSaveProgress() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-content"><h3>💾 Save Progress?</h3><p>Do you want to save your progress so you can resume this quiz later?</p><button class="confirm-yes" id="saveYes">✓ Yes, Save</button><button class="confirm-no" id="saveNo">✕ No, Discard</button></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('saveYes').onclick = async () => {
            modalDiv.remove();
            if (!timerPaused) pauseTimer();
            await saveQuizState();
            exitToFolder();
        };
        document.getElementById('saveNo').onclick = async () => {
            modalDiv.remove();
            pauseTimer();
            quizInProgress = false;
            await clearSavedState();
            exitToFolder();
        };
    }
    function exitToFolder() {
        quizInProgress = false;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches
            || window.navigator.standalone === true;
        if (isStandalone) {
            // Webapp mode: quiz replaced the portal in the same tab/window —
            // navigate back to the portal root, which restores the exact folder
            // via sessionStorage (set by the portal before opening this quiz).
            const pathParts = window.location.pathname.split('/').filter(Boolean);
            const repoName = pathParts[0] || '';
            const portalUrl = window.location.origin + '/' + repoName + '/';
            window.location.href = portalUrl;
        } else {
            // Website mode: quiz opened in a new tab — just close this tab.
            // Focus returns to the original portal tab automatically.
            window.close();
            // Fallback if the browser blocks the close (e.g. tab wasn't opened by script)
            setTimeout(() => {
                const pathParts = window.location.pathname.split('/').filter(Boolean);
                const repoName = pathParts[0] || '';
                window.location.href = window.location.origin + '/' + repoName + '/';
            }, 300);
        }
    }

    // --- Finish & Stats ---
    function finishQuiz() {
        if (timerInterval) stopTimer();
        quizActive = false; quizInProgress = false;
        // Hide the header — it's not needed on the results page and the
        // Settings icon there is misleading since the quiz is over.
        const bar = document.querySelector('.stats-bar');
        if (bar) bar.style.display = 'none';
        const { score, attempted, displayScore } = computeStats();
        addAttemptToLeaderboard(score, attempted, TOTAL_QS);
        clearSavedState();
        let finalElapsed = elapsedSeconds;
        if (!timerPaused && startTime) finalElapsed = Math.floor((Date.now() - startTime) / 1000);
        const stats = computeStats();
        const finalHtml = `<div class="finish-stats"><h2>🎉 QUIZ COMPLETE! 🎉</h2><div class="score-big">⭐ ${stats.displayScore} / ${stats.attempted} ⭐</div><div class="stats-grid"><div class="stat-card"><span>✅ CORRECT</span><span>${stats.correct}</span></div><div class="stat-card"><span>❌ INCORRECT</span><span>${stats.incorrect}</span></div><div class="stat-card"><span>⏭️ SKIPPED</span><span>${stats.skipped}</span></div><div class="stat-card"><span>🎯 ATTEMPTED</span><span>${stats.attempted} / ${stats.total}</span></div></div><p style="margin:1rem 0;">⏱️ Time taken: <strong>${formatTime(finalElapsed)}</strong></p>${savedQuestions.size > 0 ? `<p style="margin:0 0 1rem;font-size:0.85rem;opacity:0.85;">🔖 ${savedQuestions.size} saved question${savedQuestions.size!==1?'s':''} from this quiz — head to your portal's Saved tab to 🔁 Reattempt them anytime.</p>` : ''}<button id="reviewBtn" style="background:#ff9040;">📖 Review Incorrect & Skipped</button><button id="restartQuizBtn" style="background:#3c6e8f;">🔄 Restart Quiz</button><div class="leaderboard-section"><h3>🏆 Leaderboard <button class="reset-logs-btn" id="resetLeaderboardBtn">🗑️ Reset Logs</button></h3><div id="leaderboardContainer"></div></div></div>`;
        document.getElementById('quizMainContent').innerHTML = finalHtml;
        document.getElementById('reviewBtn').onclick = () => enterPostReviewMode();
        document.getElementById('restartQuizBtn').onclick = () => { clearSavedState(); location.reload(); };
        renderLeaderboard();
        document.getElementById('resetLeaderboardBtn').onclick = () => resetLeaderboard();
    }

    // --- Post-finish review ---
    function enterPostReviewMode() {
        const incorrectSkipped = [];
        for (let i = 0; i < order.length; i++) {
            const state = answersState[order[i]];
            if (state === 'incorrect' || state === 'skipped') incorrectSkipped.push(order[i]);
        }
        if (incorrectSkipped.length === 0) return;
        reviewItems = incorrectSkipped; reviewCurrentIdx = 0; showReviewItem(0);
    }
    function showReviewItem(idx) {
        reviewCurrentIdx = idx;
        const orig = reviewItems[idx];
        const q = FULL_QUIZ[orig];
        const userChoice = userSelections[orig];
        let optsHtml = '';
        for (let i = 0; i < q.opts.length; i++) {
            const optLetter = String.fromCharCode(65 + i);
            let cls = '';
            if (optLetter === q.ans) cls = 'correct-highlight';
            else if (userChoice === optLetter && userChoice !== q.ans) cls = 'wrong-highlight';
            optsHtml += `<div class="option ${cls}" style="pointer-events:none;">${q.opts[i]}</div>`;
        }
        const isSaved = savedQuestions.has(orig + 1);
        const reviewHtml = `<div class="review-counter">📌 Review ${idx+1} of ${reviewItems.length}</div><div class="question-text">${q.text}</div><div class="options-list">${optsHtml}</div><div class="explanation-box">${formatExplanationRich(q.exp)}</div><div class="action-row" style="justify-content:center;"><button class="save-btn ${isSaved ? 'saved' : ''}" id="saveQuestionBtn">${isSaved ? `${SAVE_ICON_SVG} Saved` : `${SAVE_ICON_SVG} Save`}</button></div><div style="display:flex; gap:12px; justify-content:center; margin-top:20px;"><button id="reviewPrev" ${idx===0?'disabled':''}>Previous</button><button id="reviewNext" ${idx===reviewItems.length-1?'disabled':''}>Next</button><button id="reviewBackStats">Back to Stats</button></div>`;
        document.getElementById('quizMainContent').innerHTML = reviewHtml;
        document.getElementById('saveQuestionBtn').onclick = () => toggleSaveQuestion(orig);
        document.getElementById('reviewPrev')?.addEventListener('click', () => showReviewItem(idx-1));
        document.getElementById('reviewNext')?.addEventListener('click', () => showReviewItem(idx+1));
        document.getElementById('reviewBackStats').onclick = () => finishQuiz();
    }

    // --- Render question ---
    let _renderGen = 0;
    function renderCurrent(animateCube = false, direction = 1, isAnswerReveal = false) {
        if (!quizActive) return;
        const myGen = ++_renderGen;
        const origIdx = order[currentPos];
        const q = FULL_QUIZ[origIdx];
        const state = answersState[origIdx];
        const userChoice = userSelections[origIdx];
        const isAnswered = (state === 'correct' || state === 'incorrect');
        const expMap = isAnswered ? parseExplanationByOption(q.exp) : {};
        let optionsHtml = '';
        for (let i = 0; i < q.opts.length; i++) {
            const optLetter = String.fromCharCode(65 + i);
            if (!isAnswered) {
                // Before answering: plain clickable pill, no explanation yet.
                optionsHtml += `<div class="option-capsule unanswered-capsule" onclick="handleAnswer('${optLetter}')">
                    <div class="option-text">${q.opts[i]}</div>
                </div>`;
            } else {
                // After answering: three distinct states —
                //   correct answer -> green; the option YOU picked if wrong -> red;
                //   any other unselected wrong option -> neutral/default (no green/red).
                // Each capsule still shows its own explanation, with text colour
                // matched to that capsule's background for readable contrast.
                const isCorrectOpt = optLetter === q.ans;
                const isMyWrongPick = (userChoice === optLetter && userChoice !== q.ans);
                const capsuleCls = isCorrectOpt ? 'correct-highlight' : (isMyWrongPick ? 'wrong-highlight' : 'neutral-answered');
                const info = expMap[optLetter.toLowerCase()];
                const expHtml = info ? `<div class="option-explanation">${info.text}</div>` : '';
                const sweepHtml = (isCorrectOpt || isMyWrongPick) ? '<span class="capsule-sweep"></span>' : '';
                optionsHtml += `<div class="option-capsule ${capsuleCls}" style="pointer-events:none;">
                    ${sweepHtml}
                    <div class="option-text">${q.opts[i]}</div>
                    ${expHtml}
                </div>`;
            }
        }
        let actionRow = '';
        if (isAnswered) {
            actionRow = `<div class="action-row"><button class="next-btn" id="nextAfterAnswerBtn">➡ Next Question</button><button class="save-btn ${savedQuestions.has(origIdx+1) ? 'saved' : ''}" id="saveQuestionBtn" title="Save this question for later review">${savedQuestions.has(origIdx+1) ? `${SAVE_ICON_SVG} Saved` : `${SAVE_ICON_SVG} Save`}</button></div>`;
        }
        let infoMsg = '';
        if (state === 'skipped') infoMsg = '<div class="info-message">⏭️ This question was skipped. You can answer now.</div>';
        const entranceCls = isAnswerReveal ? '' : ' entrance';
        // In-flow Focus Mode access button — only rendered while Focus Mode
        // is on, since that's the only time the header (and its own
        // Settings icon) isn't reachable. Sits after everything else
        // (options, and the Save/Next row if answered), right-aligned to
        // match the option capsules' edge, with its own margin creating
        // some breathing room below the last element — being part of the
        // actual rendered content rather than a fixed-position overlay
        // means it can never overlap the Save button or anything else,
        // since it simply flows wherever the content naturally ends.
        const focusBtnHtml = (focusMode && mode !== 'revision') ? `<div class="focus-inline-row"><button class="focus-inline-btn" id="focusInlineBtn">🎯 Focus</button></div>` : '';
        const newHtml = `<div class="question-text${entranceCls}">${currentPos+1}. ${q.text}</div><div class="options-list">${optionsHtml}</div>${actionRow}${infoMsg}${focusBtnHtml}`;

        const apply = () => {
            if (myGen !== _renderGen) return; // a newer render request has since taken over
            const el = document.getElementById('quizMainContent');
            el.innerHTML = newHtml;
            if (state === 'correct' || state === 'incorrect') {
                document.getElementById('nextAfterAnswerBtn').onclick = nextAfterAnswer;
                document.getElementById('saveQuestionBtn').onclick = () => toggleSaveQuestion(origIdx);
            }
            document.getElementById('focusInlineBtn')?.addEventListener('click', showFocusWidget);
            if (mode === 'revision') updateRevisionCounter();
        };

        const el = document.getElementById('quizMainContent');
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const hasExistingContent = animateCube && !prefersReducedMotion && el && el.innerHTML.trim() !== '';
        if (!hasExistingContent) { apply(); return; }

        // Cube-rotation transition for genuine question-to-question
        // navigation only (Next, swipe, arrow keys, nav-grid jump) — not
        // used when re-rendering the same question to reveal an answer,
        // since that's not "moving" anywhere. Guarded by the generation
        // counter above so mashing keys/buttons quickly can't leave the
        // content rotated-away or show a stale question. The rotation
        // direction mirrors depending on whether this is a forward or
        // backward move, so Next and Previous feel like opposite turns
        // of the same cube rather than identical animations.
        //
        // A full 180 degrees total (90 out + 90 in), with matching
        // complementary easing curves on each half so it reads as one
        // continuous turn rather than two separate motions — accelerate
        // into the 90-degree edge-on point, then decelerate out of it on
        // the way back to flat. No opacity fade: at exactly 90 degrees
        // the content is genuinely edge-on (zero apparent width under
        // perspective) and invisible on its own, which is also the exact
        // moment the content is swapped underneath.
        const outAngle = -90 * direction;
        const inAngle = 90 * direction;
        // The card's rounded-corner background is sized by #quizMainContent's
        // natural content height. Since questions/explanations vary in length,
        // swapping content mid-rotation would otherwise make that background
        // instantly snap to a new height — visible even though the rotated
        // content itself is hidden at that moment — which reads as the card
        // "jumping" and clashes with the smooth turn. So height is locked to
        // its current pixel value for the whole transition, then animated to
        // the new content's natural height in step with the rotation settling
        // back to flat, and released back to auto once everything's done.
        // The page now fills the full viewport height (quizMainContent has
        // flex:1, stretching short content to fill available space rather
        // than leaving a dead empty area below it). Heights are still
        // locked/animated the same way during the transition, but the
        // measurement step clears the inline height entirely (rather than
        // forcing it to 'auto') so the stylesheet's flex:1 rule resolves
        // the height exactly as it will actually render — correctly
        // flex-filled for short content, or naturally taller (causing the
        // page to scroll) for long content — instead of only ever
        // capturing the content's bare minimum intrinsic size.
        const oldHeight = el.getBoundingClientRect().height;
        el.style.height = oldHeight + 'px';
        el.style.overflow = 'hidden';
        el.style.transition = 'transform 0.25s cubic-bezier(.55,0,1,0.45)';
        el.style.transform = `rotateY(${outAngle}deg)`;
        setTimeout(() => {
            if (myGen !== _renderGen) return;
            apply();
            const el2 = document.getElementById('quizMainContent');
            // Measure the new content's natural (flex-resolved) height while
            // still locked at oldHeight, then immediately re-lock — this all
            // happens synchronously before the browser paints, so there's no
            // visible flash of the unlocked state.
            el2.style.height = '';
            const newHeight = el2.getBoundingClientRect().height;
            el2.style.height = oldHeight + 'px';
            el2.style.transition = 'none';
            el2.style.transform = `rotateY(${inAngle}deg)`;
            requestAnimationFrame(() => {
                if (myGen !== _renderGen) return;
                el2.style.transition = 'transform 0.25s cubic-bezier(0,0.55,0.45,1), height 0.25s cubic-bezier(0,0.55,0.45,1)';
                el2.style.transform = 'rotateY(0deg)';
                el2.style.height = newHeight + 'px';
                setTimeout(() => {
                    if (myGen !== _renderGen) return;
                    el2.style.height = '';
                    el2.style.overflow = '';
                }, 260);
            });
        }, 250);
    }

    // Double-tap (or double-click) anywhere on the question to toggle 🔖 Save
    function attachDoubleTapBookmark(el, getOrigIdx) {
        if (!el) return;
        let lastTap = 0;
        let lastMouseDown = 0;
        const trigger = async () => {
            const origIdx = getOrigIdx();
            const isAnswered = answersState[origIdx] === 'correct' || answersState[origIdx] === 'incorrect';
            if (!isAnswered) {
                // Unanswered (or already skipped) — double-tap skips, same as the Skip button.
                skipCurrent();
                showQuizToast('Skipped');
                playSkipAnim();
                return;
            }
            // Answered — double-tap toggles save/unsave, same as before.
            const wasSaved = savedQuestions.has(origIdx + 1);
            await toggleSaveQuestion(origIdx);
            showQuizToast(wasSaved ? 'Removed from Saved' : 'Saved');
            playBookmarkAnim(!wasSaved);
        };
        // Belt-and-suspenders: user-select:none (CSS) already blocks selection,
        // but some mobile browsers still flash a selection/magnifier on the
        // second tap before CSS fully applies — the touchend handler below
        // calls preventDefault on what looks like a second tap, after the
        // gesture is already complete. (A touchstart-level preventDefault
        // was tried here too, but it fired on timing alone with no way to
        // tell a genuine double-tap apart from two quick consecutive swipes
        // — silently cancelling the second swipe's scroll before it could
        // even start. Removed for that reason.)
        el.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTap < 350) {
                e.preventDefault();
                window.getSelection()?.removeAllRanges();
                trigger();
            }
            lastTap = now;
        });
        el.addEventListener('mousedown', (e) => {
            const now = Date.now();
            if (now - lastMouseDown < 350) {
                e.preventDefault();
                window.getSelection()?.removeAllRanges();
            }
            lastMouseDown = now;
        });
        el.addEventListener('dblclick', (e) => {
            e.preventDefault();
            window.getSelection()?.removeAllRanges();
            trigger();
        });
    }

    // Beautiful fill/empty ribbon animation for save/unsave, themed via --accent
    function playBookmarkAnim(filling) {
        const anim = document.getElementById('bookmarkAnim');
        const clipRect = document.getElementById('bmClipRect');
        if (!anim || !clipRect) return;
        anim.classList.remove('show', 'hide');
        clipRect.style.transition = 'none';
        clipRect.setAttribute('y', filling ? '120' : '0');
        void anim.offsetWidth;
        clipRect.style.transition = '';
        anim.classList.add('show');
        requestAnimationFrame(() => {
            clipRect.setAttribute('y', filling ? '0' : '120');
        });
        clearTimeout(anim._hideTimer);
        anim._hideTimer = setTimeout(() => {
            anim.classList.remove('show');
            anim.classList.add('hide');
        }, 750);
    }
    // Skip animation — same design language as the bookmark ribbon (scale-in
    // bounce, accent-themed outline+fill, clip-rect reveal), just a different
    // icon (skip-forward chevrons) swept horizontally instead of vertically.
    // Always plays as a single forward "wipe" — skip has no saved/unsaved
    // toggle state, so there's no fill/drain distinction needed.
    function playSkipAnim() {
        const anim = document.getElementById('skipAnim');
        const clipRect = document.getElementById('skClipRect');
        if (!anim || !clipRect) return;
        anim.classList.remove('show', 'hide');
        clipRect.style.transition = 'none';
        clipRect.setAttribute('x', '-120');
        void anim.offsetWidth;
        clipRect.style.transition = '';
        anim.classList.add('show');
        requestAnimationFrame(() => {
            clipRect.setAttribute('x', '0');
        });
        clearTimeout(anim._hideTimer);
        anim._hideTimer = setTimeout(() => {
            anim.classList.remove('show');
            anim.classList.add('hide');
        }, 750);
    }
    function showQuizToast(msg) {
        let t = document.getElementById('quizToast');
        if (!t) {
            t = document.createElement('div');
            t.id = 'quizToast';
            t.style.cssText = 'position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--accent-dark); color:var(--button-text); padding:10px 22px; border-radius:40px; font-weight:600; font-size:0.9rem; z-index:5000; box-shadow:var(--shadow-lg); opacity:0; transition:opacity 0.2s;';
            document.body.appendChild(t);
        }
        t.textContent = msg;
        t.style.opacity = '1';
        clearTimeout(t._hideTimer);
        t._hideTimer = setTimeout(() => { t.style.opacity = '0'; }, 1300);
    }

    // Generic left/right swipe detection for touch navigation. Swipe-down-to-
    // skip was removed — it conflicted with the browser's native pull-to-
    // refresh and with scrolling up to read a long question. Skip is now
    // reached via double-tap on an unanswered question instead (see
    // attachDoubleTapBookmark), so vertical swipes/scrolling are left
    // completely alone.
    function attachSwipeNav(el, onSwipeLeft, onSwipeRight) {
        if (!el) return;
        let startX = 0, startY = 0;
        el.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });
        el.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                if (dx < 0) onSwipeLeft && onSwipeLeft();
                else onSwipeRight && onSwipeRight();
            }
        }, { passive: true });
    }

    // Two-finger trackpad swipe (Windows precision touchpads, macOS) — these
    // arrive as 'wheel' events with deltaX/deltaY, not touch events, since
    // a trackpad isn't a touchscreen. A single physical swipe fires MANY
    // small wheel events in quick succession (not one big one), so deltas
    // are accumulated until a threshold is crossed, then navigation fires
    // once and further events from that same gesture are ignored until it
    // visibly ends (a short gap with no events) or the cooldown expires.
    //
    // Safety: any event where vertical movement is equal to or greater than
    // horizontal movement is left completely alone — no preventDefault, no
    // accumulation, nothing — so normal two-finger vertical scrolling and
    // ordinary mouse-wheel scrolling are never touched by this, regardless
    // of how small or large the gesture is. preventDefault is only called
    // on confirmed horizontal-dominant events, which also doubles as
    // protection against the browser's own swipe-to-go-back/forward page
    // navigation firing accidentally during what's meant to be in-quiz
    // question navigation.
    function attachTrackpadSwipeNav(el, onSwipeLeft, onSwipeRight) {
        if (!el) return;
        let accumX = 0;
        let cooldownUntil = 0;
        let resetTimer = null;
        const THRESHOLD = 60;
        const COOLDOWN_MS = 500; // comfortably longer than the cube-transition animation

        el.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaX) <= Math.abs(e.deltaY)) {
                accumX = 0; // looks vertical — ignore entirely, don't touch default behavior
                return;
            }
            if (Date.now() < cooldownUntil) {
                e.preventDefault(); // still part of the gesture we already acted on
                return;
            }
            e.preventDefault();
            accumX += e.deltaX;

            clearTimeout(resetTimer);
            resetTimer = setTimeout(() => { accumX = 0; }, 150);

            if (Math.abs(accumX) > THRESHOLD) {
                cooldownUntil = Date.now() + COOLDOWN_MS;
                // Natural-scrolling left-swipe produces positive deltaX —
                // matches attachSwipeNav's "finger moves left -> next"
                // convention above, so both gesture types feel consistent.
                if (accumX > 0) onSwipeLeft && onSwipeLeft();
                else onSwipeRight && onSwipeRight();
                accumX = 0;
            }
        }, { passive: false });
    }

    // --- Font slider ---

    // --- Keyboard navigation shortcuts ---
    // ArrowLeft/Right: move between questions. S: skip. 1-4: select option A-D.
    // Guarded against firing while typing in an input/textarea, and while any
    // modal/overlay (instructions, close-quiz confirm, question-grid nav pane)
    // is open on top of the quiz, so a shortcut never silently answers/skips
    // the question hidden underneath.
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (!quizActive) return;
        if (document.querySelector('.modal, .instructions-modal')) return;
        if (document.getElementById('navPane')?.classList.contains('show')) return;
        const isRevision = mode === 'revision';
        switch (e.key) {
            case 'ArrowLeft':
                e.preventDefault();
                isRevision ? revisionMove(-1) : moveToQuestion(currentPos - 1);
                break;
            case 'ArrowRight':
                e.preventDefault();
                isRevision ? revisionMove(1) : moveToQuestion(currentPos + 1);
                break;
            case 's': case 'S':
                if (isRevision) break; // no skipping in revision mode
                e.preventDefault();
                skipCurrent();
                showQuizToast('Skipped');
                playSkipAnim();
                break;
            case 'f': case 'F':
                if (isRevision) break; // no finish in revision mode
                e.preventDefault();
                if (!skipReviewMode) promptFinishOrReview(); else endSkipReviewSession();
                break;
            case ' ': {
                e.preventDefault();
                const origIdx = order[currentPos];
                const wasSaved = savedQuestions.has(origIdx + 1);
                toggleSaveQuestion(origIdx).then(() => {
                    showQuizToast(wasSaved ? 'Removed from Saved' : 'Saved');
                    playBookmarkAnim(!wasSaved);
                });
                break;
            }
            case '1': if (!isRevision) { e.preventDefault(); handleAnswer('A'); } break;
            case '2': if (!isRevision) { e.preventDefault(); handleAnswer('B'); } break;
            case '3': if (!isRevision) { e.preventDefault(); handleAnswer('C'); } break;
            case '4': if (!isRevision) { e.preventDefault(); handleAnswer('D'); } break;
        }
    });

    // --- Settings button: opens a modal with Dark Mode, Font Size, and
    // Focus Mode together, instead of separate icon-row controls. ---
    function initSettingsButton() {
        const btn = document.getElementById('settingsBtn');
        if (btn) btn.addEventListener('click', showSettingsModal);
        initFocusWidget();
    }

    // --- Focus Widget: the floating panel reachable via the in-flow
    // Focus button (rendered as part of each question's content, see
    // renderCurrent) while Focus Mode is on. Surfaces everything the
    // hidden header normally provides — stats, timer, the question-jump
    // grid — plus Dark Mode, Font Size, and a way to turn Focus Mode
    // back off, all in one place, since none of the header's own
    // controls are reachable otherwise. ---
    function showFocusWidget() {
        document.getElementById('focusWidget')?.classList.add('show');
        document.getElementById('focusWidgetBackdrop')?.classList.add('show');
        updateTopStats();
    }
    function closeFocusWidget() {
        document.getElementById('focusWidget')?.classList.remove('show');
        document.getElementById('focusWidgetBackdrop')?.classList.remove('show');
    }
    function initFocusWidget() {
        document.getElementById('closeFocusWidgetBtn')?.addEventListener('click', closeFocusWidget);
        document.getElementById('focusWidgetBackdrop')?.addEventListener('click', closeFocusWidget);

        document.getElementById('fwDarkBtn')?.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('quiz_dark', document.body.classList.contains('dark-theme'));
        });

        document.getElementById('fwFocusBtn')?.addEventListener('click', () => {
            setFocusMode(false);
            closeFocusWidget();
            renderCurrent();
        });

        document.getElementById('fwFinishBtn')?.addEventListener('click', () => {
            closeFocusWidget();
            promptFinishOrReview();
        });

        // Fonts: toggles an inline slider row within the widget itself,
        // rather than stacking another modal on top of it.
        const fontRow = document.getElementById('fwFontRow');
        document.getElementById('fwFontsBtn')?.addEventListener('click', () => {
            fontRow?.classList.toggle('show');
        });
        const fwSlider = document.getElementById('fwFontSlider');
        const fwPct = document.getElementById('fwFontPercent');
        if (fwSlider) {
            const current = parseInt(document.documentElement.style.fontSize) || 16;
            fwSlider.value = current;
            if (fwPct) fwPct.innerText = Math.round((current/16)*100) + '%';
            fwSlider.addEventListener('input', (e) => {
                const px = parseInt(e.target.value);
                document.documentElement.style.fontSize = px + 'px';
                if (fwPct) fwPct.innerText = Math.round((px/16)*100) + '%';
                currentFontSize = px; localStorage.setItem('quiz_fontsize', px);
            });
        }
    }

    function showSettingsModal() {
        document.querySelector('.modal')?.remove();
        const isDark = document.body.classList.contains('dark-theme');
        const fontPx = parseInt(document.documentElement.style.fontSize) || 16;
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-content settings-modal-content"><button class="popup-close-btn" id="closeSettingsXBtn" aria-label="Close">✕</button>
            <h3>⚙️ Settings</h3>
            <div class="settings-row">
                <span class="settings-label">🌙 Dark Mode</span>
                <button class="toggle-switch ${isDark ? 'on' : ''}" id="settingsDarkToggle" role="switch" aria-checked="${isDark}" aria-label="Toggle dark mode"><span class="toggle-knob"></span></button>
            </div>
            <div class="settings-row">
                <span class="settings-label">🔤 Font Size</span>
                <div class="settings-font-control">
                    <input type="range" id="settingsFontSlider" min="10" max="32" step="1" value="${fontPx}">
                    <span id="settingsFontPercent">${Math.round((fontPx/16)*100)}%</span>
                </div>
            </div>
            <div class="settings-row">
                <span class="settings-label">🎯 Focus Mode</span>
                <button class="toggle-switch ${focusMode ? 'on' : ''}" id="settingsFocusModeToggle" role="switch" aria-checked="${focusMode}" aria-label="Toggle Focus Mode"><span class="toggle-knob"></span></button>
            </div>
        </div>`;
        document.body.appendChild(modalDiv);

        document.getElementById('settingsDarkToggle').addEventListener('click', (e) => {
            document.body.classList.toggle('dark-theme');
            const dark = document.body.classList.contains('dark-theme');
            localStorage.setItem('quiz_dark', dark);
            e.currentTarget.classList.toggle('on', dark);
            e.currentTarget.setAttribute('aria-checked', dark);
        });

        const slider = document.getElementById('settingsFontSlider');
        const pct = document.getElementById('settingsFontPercent');
        slider.addEventListener('input', (e) => {
            const px = parseInt(e.target.value);
            document.documentElement.style.fontSize = px + 'px';
            pct.innerText = Math.round((px/16)*100) + '%';
            currentFontSize = px; localStorage.setItem('quiz_fontsize', px);
        });

        document.getElementById('settingsFocusModeToggle').addEventListener('click', (e) => {
            setFocusMode(!focusMode);
            e.currentTarget.classList.toggle('on', focusMode);
            e.currentTarget.setAttribute('aria-checked', focusMode);
            renderCurrent();
        });


        document.getElementById('closeSettingsXBtn').onclick = () => modalDiv.remove();
        modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) modalDiv.remove(); });
    }

    // --- Focus Mode: a simple on/off toggle. On hides the top bar
    // completely (no scroll-direction detection, no auto show/hide) so the
    // question always gets the full screen; off restores normal behavior.
    // Reachable even while hidden via the in-flow Focus button rendered as
    // part of each question's own content (see renderCurrent), since the
    // header — including the Settings icon that lives in it — is gone
    // while Focus Mode is on.
    function setFocusMode(on) {
        focusMode = on;
        localStorage.setItem('quiz_focus_mode', on);
        document.body.classList.toggle('focus-mode', on);
    }

    // --- Resume saved quiz ---
    async function resumeSavedQuiz(savedState) {
        mode = savedState.mode; order = savedState.order; currentPos = savedState.currentPos;
        answersState = savedState.answersState; userSelections = savedState.userSelections;
        elapsedSeconds = savedState.elapsedSeconds; timerPaused = savedState.timerPaused;
        skipReviewMode = savedState.skipReviewMode || false;
        skipReviewList = savedState.skipReviewList || [];
        currentSkipReviewIndex = savedState.currentSkipReviewIndex || 0;
        quizActive = true; quizInProgress = true;
        attachSavedQuestionsListener();
        renderMainUI(); initSettingsButton();
        startTime = Date.now() - (elapsedSeconds * 1000);
        if (!timerPaused) {
            timerInterval = setInterval(() => {
                if (!quizActive || timerPaused) return;
                setTimerDisplay(formatTime(Math.floor((Date.now() - startTime) / 1000)));
            }, 1000);
        } else {
            setTimerContainerState('0.7');
        }
        updateTopStats(); buildNavPane(); renderCurrent();
        leaderboardLoggedForThisSession = false;
    }

    // --- Init quiz ---
    async function initializeQuiz(selectedMode) {
        mode = selectedMode;
        let indices = [...Array(TOTAL_QS).keys()];
        if (mode === 'random') {
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
        }
        order = indices;
        currentPos = 0; quizActive = true;
        skipReviewMode = false; skipReviewList = [];
        elapsedSeconds = 0; timerPaused = false;
        leaderboardLoggedForThisSession = false;

        if (mode === 'revision') {
            // Pre-mark every question as correctly answered with the correct
            // selection — renderCurrent's existing answered-state path already
            // renders green correct + neutral wrong capsules with explanations,
            // so we get the revision view for free with no extra rendering code.
            answersState = FULL_QUIZ.map(() => 'correct');
            userSelections = FULL_QUIZ.map(q => q.ans);
            quizInProgress = false; // no progress to save; this is read-only
            document.body.classList.add('revision-mode');
            document.body.classList.remove('focus-mode');
            attachSavedQuestionsListener(); // same key as regular modes — bookmarks are shared
            renderRevisionUI();
            initSettingsButton();
        } else {
            answersState = new Array(TOTAL_QS).fill('unanswered');
            userSelections = new Array(TOTAL_QS).fill(null);
            quizInProgress = true;
            document.body.classList.remove('revision-mode');
            clearSavedState();
            attachSavedQuestionsListener();
            startTimer(); renderMainUI(); initSettingsButton();
        }
    }

    // --- Revision Mode UI ---
    function renderRevisionUI() {
        const root = document.getElementById('root');
        root.innerHTML = `<div class="quiz-container"><div class="stats-bar"></div><div class="revision-bar"><span class="revision-counter" id="revCounter">1 / ${TOTAL_QS}</span><button class="icon-btn" id="revSettingsBtn" title="Settings" aria-label="Settings" style="width:44px;height:44px;flex-shrink:0;"><span class="btn-icon" style="display:flex;align-items:center;justify-content:center;">${SETTINGS_ICON_SVG.replace('width="20" height="24"','width="26" height="31"')}</span></button></div><div id="navPane" class="nav-pane"><div id="navGrid" class="nav-grid"></div></div><div id="quizMainContent" class="question-panel"></div></div>`;
        document.getElementById('revSettingsBtn').addEventListener('click', showRevisionSettingsModal);
        const content = document.getElementById('quizMainContent');
        attachSwipeNav(content, () => revisionMove(1), () => revisionMove(-1));
        attachTrackpadSwipeNav(content, () => revisionMove(1), () => revisionMove(-1));
        // Double-tap saves in revision mode (skip is suppressed since all are already answered)
        attachDoubleTapBookmark(content, () => order[currentPos]);
        buildNavPane();
        renderCurrent();
    }

    function revisionMove(dir) {
        const newPos = currentPos + dir;
        if (newPos < 0 || newPos >= order.length) return;
        currentPos = newPos;
        updateRevisionCounter();
        renderCurrent(true, dir);
    }

    function updateRevisionCounter() {
        const el = document.getElementById('revCounter');
        if (el) el.textContent = `${currentPos + 1} / ${TOTAL_QS}`;
    }

    function showRevisionSettingsModal() {
        document.querySelector('.modal')?.remove();
        const isDark = document.body.classList.contains('dark-theme');
        const fontPx = parseInt(document.documentElement.style.fontSize) || 16;
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-content settings-modal-content"><button class="popup-close-btn" id="revCloseSettingsXBtn" aria-label="Close">✕</button>
            <h3>⚙️ Settings</h3>
            <div class="settings-row">
                <span class="settings-label">🌙 Dark Mode</span>
                <button class="toggle-switch ${isDark ? 'on' : ''}" id="revSettingsDarkToggle" role="switch" aria-checked="${isDark}" aria-label="Toggle dark mode"><span class="toggle-knob"></span></button>
            </div>
            <div class="settings-row">
                <span class="settings-label">🔤 Font Size</span>
                <div class="settings-font-control">
                    <input type="range" id="revSettingsFontSlider" min="10" max="32" step="1" value="${fontPx}">
                    <span id="revSettingsFontPercent">${Math.round((fontPx/16)*100)}%</span>
                </div>
            </div>
            <div class="settings-row">
                <span class="settings-label">🚪 Exit Revision</span>
                <button class="toggle-switch" id="revExitBtn" style="width:auto;padding:0 12px;border-radius:8px;font-size:0.85rem;font-weight:700;background:var(--accent-dark);color:var(--button-text);">Exit</button>
            </div>
        </div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('revCloseSettingsXBtn').onclick = () => modalDiv.remove();
        modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) modalDiv.remove(); });
        document.getElementById('revSettingsDarkToggle').addEventListener('click', (e) => {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('quiz_dark', document.body.classList.contains('dark-theme'));
            e.currentTarget.classList.toggle('on', document.body.classList.contains('dark-theme'));
        });
        const slider = document.getElementById('revSettingsFontSlider');
        const pct = document.getElementById('revSettingsFontPercent');
        slider.addEventListener('input', (e) => {
            const px = parseInt(e.target.value);
            document.documentElement.style.fontSize = px + 'px';
            pct.innerText = Math.round((px/16)*100) + '%';
            currentFontSize = px; localStorage.setItem('quiz_fontsize', px);
        });
        document.getElementById('revExitBtn').onclick = () => {
            modalDiv.remove();
            document.body.classList.remove('revision-mode');
            quizActive = false;
            showWelcome();
        };
    }

    // --- Render main quiz UI ---
    function renderMainUI() {
        const root = document.getElementById('root');
        root.innerHTML = `<div class="quiz-container"><div class="stats-bar"><div class="top-pills-row"><div class="stats-group"><div class="stat"><span>✅</span><span class="stat-label">Correct</span> <span id="statCorrect" class="stat-correct-value">0</span></div><div class="stat"><span>❌</span><span class="stat-label">Wrong</span> <span id="statWrong" class="stat-wrong-value">0</span></div><div class="stat"><span>⏭️</span><span class="stat-label">Skip</span> <span id="statSkip" class="stat-skip-value">0</span></div></div><div class="timer timer-container" id="timerContainer">⏱️ <span id="timerDisplay" class="timer-display">00:00</span></div></div><div class="icon-row"><button class="icon-btn" id="toggleNavBtn" title="Questions" aria-label="Questions"><span class="btn-icon">${QUESTIONS_ICON_SVG}</span><span class="btn-label">Questions</span></button><button class="icon-btn" id="skipBtn" title="Skip" aria-label="Skip"><span class="btn-icon">${SKIP_ICON_SVG}</span><span class="btn-label">Skip</span></button><button class="icon-btn" id="finishQuizBtn" title="Finish" aria-label="Finish"><span class="btn-icon">${FINISH_ICON_SVG}</span><span class="btn-label">Finish</span></button><button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings"><span class="btn-icon">${SETTINGS_ICON_SVG}</span><span class="btn-label">Settings</span></button></div></div><div id="navPane" class="nav-pane"><div id="navGrid" class="nav-grid"></div></div><div id="quizMainContent" class="question-panel"></div></div><div id="focusWidgetBackdrop" class="focus-widget-backdrop"></div><div id="focusWidget" class="focus-widget"><button class="popup-close-btn" id="closeFocusWidgetBtn" aria-label="Close">✕</button><div class="focus-widget-top-row"><div class="stats-group"><div class="stat"><span>✅</span> <span class="stat-correct-value">0</span></div><div class="stat"><span>❌</span> <span class="stat-wrong-value">0</span></div><div class="stat"><span>⏭️</span> <span class="stat-skip-value">0</span></div></div><div class="timer timer-container">⏱️ <span class="timer-display">00:00</span></div></div><div class="nav-grid"></div><div class="focus-widget-actions"><button class="fw-action-btn" id="fwDarkBtn">🌙 Day/Night</button><button class="fw-action-btn" id="fwFontsBtn">🔤 Fonts</button><button class="fw-action-btn" id="fwFocusBtn">🎯 Focus</button><button class="fw-action-btn" id="fwFinishBtn">🏁 Finish</button></div><div class="settings-row fw-font-row" id="fwFontRow"><span class="settings-label">🔤 Font Size</span><div class="settings-font-control"><input type="range" id="fwFontSlider" min="10" max="32" step="1" value="16"><span id="fwFontPercent">100%</span></div></div></div>`;
        document.getElementById('toggleNavBtn').onclick = toggleNavPane;
        document.getElementById('skipBtn').onclick = skipCurrent;
        document.getElementById('finishQuizBtn').onclick = () => { if (!skipReviewMode) promptFinishOrReview(); else endSkipReviewSession(); };
        document.querySelectorAll('.timer-container').forEach(el => el.addEventListener('click', toggleTimerPause));
        attachSwipeNav(document.getElementById('quizMainContent'), () => moveToQuestion(currentPos + 1), () => moveToQuestion(currentPos - 1));
        attachTrackpadSwipeNav(document.getElementById('quizMainContent'), () => moveToQuestion(currentPos + 1), () => moveToQuestion(currentPos - 1));
        attachDoubleTapBookmark(document.getElementById('quizMainContent'), () => order[currentPos]);
        buildNavPane(); renderCurrent(); updateTopStats();
    }

    // --- beforeunload exit warning ---
    function setupBeforeUnload() {
        window.addEventListener('beforeunload', (e) => {
            if (quizInProgress) {
                if (!timerPaused) pauseTimer();
                e.preventDefault();
                e.returnValue = 'You have unsaved quiz progress. Are you sure you want to leave?';
                return e.returnValue;
            }
        });
        window.addEventListener('focus', () => {
            if (timerPausedByBeforeUnload && timerPaused && quizInProgress) { resumeTimer(); timerPausedByBeforeUnload = false; }
        });
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && timerPausedByBeforeUnload && timerPaused && quizInProgress) { resumeTimer(); timerPausedByBeforeUnload = false; }
        });
    }
    setupBeforeUnload();

    // --- Instructions modal ---
    function showInstructions() {
        const modal = document.createElement('div');
        modal.className = 'instructions-modal';
        modal.innerHTML = `<div class="instructions-card"><div class="instructions-header"><h3>How to Use This Quiz</h3><button class="close-instructions" id="closeInstructionsBtn">✖</button></div><div class="instructions-section"><h4 class="instructions-section-title">📱 Touch Screen Devices</h4><ol class="instructions-list"><li><strong>Double-tap a blank area:</strong> Skip the question and revisit it later.</li><li><strong>Double-tap after selecting an option:</strong> Save or unsave the question.</li><li><strong>Swipe left or right:</strong> Move to the previous or next question.</li><li><strong>Swipe up or down:</strong> Scroll through the question.</li></ol></div><div class="instructions-section"><h4 class="instructions-section-title">💻 Laptop and Desktop</h4><ol class="instructions-list"><li><strong>1, 2, 3, 4:</strong> Select option A, B, C, or D.</li><li><strong>S:</strong> Skip the question.</li><li><strong>Space:</strong> Save or unsave the question.</li><li><strong>Left or Right arrow key:</strong> Move to the previous or next question.</li><li><strong>Two-finger swipe left or right (trackpad):</strong> Move to the previous or next question, same as the arrow keys.</li><li><strong>Up or Down arrow key:</strong> Scroll through the question.</li><li><strong>F:</strong> Finish the quiz.</li></ol></div><div class="instructions-section"><h4 class="instructions-section-title">⚙️ General</h4><ol class="instructions-list"><li><strong>Timer:</strong> Click it to pause and resume.</li><li><strong>Settings (⚙️ icon):</strong> Dark Mode, Font Size, and Focus Mode all live here.</li><li><strong>Focus Mode:</strong> Hides the top bar completely so every question gets the full screen. While it's on, tap the small floating ⚙️ button to bring Settings back and turn it off.</li><li><strong>Scoring:</strong> +1 for a correct answer, 0 for an unanswered question, −0.33 for an incorrect answer.</li></ol></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('closeInstructionsBtn').onclick = () => modal.remove();
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }

    // --- Welcome screen ---
    async function showWelcome() {
        const root = document.getElementById('root');
        root.innerHTML = `<div class="welcome-overlay"><div class="welcome-card" style="text-align:center;"><p style="font-size:1.2rem;">⏳ Loading...</p></div></div>`;
        const saved = await loadQuizState();
        if (saved) {
            const overlay = document.createElement('div');
            overlay.className = 'welcome-overlay';
            overlay.innerHTML = `<div class="welcome-card"><h2>📀 Saved Progress Found</h2><p>You have an unfinished quiz. Do you want to resume where you left off?</p><div class="mode-buttons"><button class="confirm-yes" id="resumeYesBtn">✓ Yes, Resume</button><button class="confirm-no" id="resumeNoBtn">✕ No, Start Fresh</button></div></div>`;
            root.innerHTML = '';
            document.body.appendChild(overlay);
            document.getElementById('resumeYesBtn').onclick = () => { overlay.remove(); resumeSavedQuiz(saved); };
            document.getElementById('resumeNoBtn').onclick = async () => { overlay.remove(); await clearSavedState(); showWelcome(); };
            return;
        }
        root.innerHTML = `<div class="welcome-overlay" id="welcomeOverlay"><div class="welcome-card"><h1>${topicName}</h1><div class="quiz-stats-badge">🏺 ${TOTAL_QS} Questions · +1 / -0.33</div><p style="font-weight: 500; margin: 0.5rem 0 0; font-size: clamp(0.9rem, 2.2vw, 1rem);">Please choose your mode</p><div class="mode-buttons"><button class="mode-btn" id="sysMode">📖 Systematic Mode</button><button class="mode-btn rand" id="randMode">🎲 Random Mode</button><button class="mode-btn rev" id="revMode">📚 Revision Mode</button></div><div style="text-align: center; margin-top: 12px;"><button class="instructions-small" id="instructionsBtn">📋 Instructions</button></div></div></div>`;
        document.getElementById('sysMode').onclick = () => { document.getElementById('welcomeOverlay').remove(); initializeQuiz('systematic'); };
        document.getElementById('randMode').onclick = () => { document.getElementById('welcomeOverlay').remove(); initializeQuiz('random'); };
        document.getElementById('revMode').onclick = () => { document.getElementById('welcomeOverlay').remove(); initializeQuiz('revision'); };
        document.getElementById('instructionsBtn').onclick = () => showInstructions();
    }
    // Sign in anonymously before the bootstrap below touches the database
    // (loadQuizState inside showWelcome, and the file-manager sync listener,
    // both fire immediately on page load). See the portal's index.html for
    // the full rationale — in short, this lets Firebase rules require
    // "auth != null" instead of being fully open, blocking unauthenticated
    // scanners while staying invisible to real visitors.
    (async () => {
        try { await firebase.auth().signInAnonymously(); } catch(e) { console.warn('Anonymous auth failed:', e); }
        showWelcome();
        initQuizFMListener();
    })();
</script>
</body>
</html>
